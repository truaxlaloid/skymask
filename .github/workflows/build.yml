name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.9'
        cache-disabled: true # Turns off cache storage to prevent GitHub transient server warnings

    - name: Build with Gradle
      run: gradle build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: skymask-neoforge-jar
        path: build/libs/
